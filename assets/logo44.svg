<svg xmlns="http://www.w3.org/2000/svg"
     width="128"
     height="128"
     viewBox="0 0 128 128">

  <defs>
    <linearGradient id="tube" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb6d9"/>
      <stop offset="50%" stop-color="#d86bff"/>
      <stop offset="100%" stop-color="#7a2cff"/>
    </linearGradient>

    <linearGradient id="leg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff7db8"/>
      <stop offset="100%" stop-color="#8a2dff"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="rotate(-25 64 64)" filter="url(#glow)">

    <!-- Telescope Tube -->
    <rect x="30" y="48"
          width="56"
          height="18"
          rx="9"
          fill="url(#tube)"/>

    <!-- Front Lens -->
    <circle cx="88" cy="57"
            r="12"
            fill="#ffc8e3"
            stroke="#ffffff"
            stroke-width="2"/>

    <circle cx="88" cy="57"
            r="7"
            fill="#7b2cff"/>

    <!-- Eyepiece -->
    <rect x="20"
          y="52"
          width="12"
          height="10"
          rx="3"
          fill="#9a3fff"/>

    <!-- Mount -->
    <circle cx="58"
            cy="70"
            r="5"
            fill="#ff6da8"/>

    <!-- Stand -->
    <line x1="58" y1="75" x2="44" y2="108"
          stroke="url(#leg)"
          stroke-width="5"
          stroke-linecap="round"/>

    <line x1="58" y1="75" x2="72" y2="108"
          stroke="url(#leg)"
          stroke-width="5"
          stroke-linecap="round"/>

    <line x1="58" y1="75" x2="58" y2="108"
          stroke="url(#leg)"
          stroke-width="5"
          stroke-linecap="round"/>

  </g>

  <!-- Stars -->
  <circle cx="20" cy="20" r="2" fill="#ff4c9a"/>
  <circle cx="106" cy="26" r="2" fill="#ff4c9a"/>
  <circle cx="98" cy="104" r="2" fill="#ff4c9a"/>

</svg>